name: CI/CD - NPM Deployment

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run CI Checks
        # Assuming you'll add lint/test scripts soon
        run: |
          if npm run test --if-present; then
            echo "Tests passed (or none found)."
          fi

  publish:
    name: Publish to NPM
    needs: build
    # Run on: pushes to main, pushes of tags (v*), or manual dispatch
    if: |
      startsWith(github.ref, 'refs/tags/v') || 
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Check if Version is Already Published
        id: check_published
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if npm view plano-mcp@$CURRENT_VERSION version >/dev/null 2>&1; then
            echo "Version $CURRENT_VERSION is already published. Skipping."
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "Version $CURRENT_VERSION is new. Proceeding."
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish Package
        if: steps.check_published.outputs.published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
